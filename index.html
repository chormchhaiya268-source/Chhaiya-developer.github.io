<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Request</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #fce4ec;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        h1 { color: #880e4f; text-align: center; }

        .box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .buttons {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        button {
            padding: 12px 25px;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        #yesBtn { background-color: #ec407a; color: white; }

        #noBtn {
            background-color: #9e9e9e;
            color: white;
            position: relative; /* Needed for the jumping effect */
        }
    </style>
</head>
<body>

    <div class="box">
        <h1 id="headerText">Will you be my girlfriend? ✨</h1>
        <div class="buttons">
            <button id="yesBtn">Of course!</button>
            <button id="noBtn">No thanks</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const headerText = document.getElementById('headerText');

        // --- THE REDIRECT LINK ---
        const targetLink = "https://chormchhaiya268-source.github.io/Chhaiya-developer.github.io/";

        let yesScale = 1;
        let moveCount = 0;

        // Function to move button and grow YES button
        function handleNoInteraction() {
            moveCount++;

            // 1. Make YES button bigger
            yesScale += 0.5;
            yesBtn.style.transform = `scale(${yesScale})`;

            // 2. Move NO button to a random spot
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.position = 'absolute';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;

            // 3. Change text based on how many times they tried to click No
            if (moveCount > 3) headerText.innerText = "Why are you trying to say no? 🥺";
            if (moveCount > 7) headerText.innerText = "The YES is getting huge! Just click it!";
        }

        // Moves when mouse touches it (PC)
        noBtn.addEventListener('mouseover', handleNoInteraction);
        
        // Redirects if they actually manage to click it (Mobile or fast click)
        noBtn.addEventListener('click', () => {
            window.location.href = targetLink;
        });

        // Success redirect
        yesBtn.addEventListener('click', () => {
            headerText.innerText = "I knew you'd say yes! ❤️";
            // You can also redirect to a "Success" page here if you want:
            // window.location.href = "your-success-page.com";
        });
    </script>
</body>
</html>
