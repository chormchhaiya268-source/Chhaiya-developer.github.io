<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I have a private question...</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* 1. Added a romantic gradient background */
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4e1 50%, #fff0f5 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
            position: relative; /* Container for floating hearts */
        }

        /* 2. Style for animated floating hearts */
        .heart-float {
            position: absolute;
            bottom: -50px;
            color: #ffb6c1; /* Soft pink color */
            font-size: 1.5rem;
            animation: float-around 5s infinite ease-in;
            opacity: 0.8;
            pointer-events: none; /* Can't click the hearts */
        }

        @keyframes float-around {
            0% {
                transform: translateY(0) scale(0.5) translateX(0);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-120vh) scale(1.5) translateX(var(--floating-x));
                opacity: 0;
            }
        }

        h1 {
            color: #d63384;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            padding: 0 20px;
            /* 3. Subtle glow effect for text */
            text-shadow: 0 2px 5px rgba(255, 182, 193, 0.5);
            z-index: 10; /* Keep text above hearts */
        }

        .btn-container {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            z-index: 10; /* Keep buttons above hearts */
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
            z-index: 1000;
            /* 4. Fix growth point so it doesn't immediately obscure question */
            transform-origin: center bottom;
        }

        #noBtn {
            background-color: #adb5bd;
            color: white;
            position: relative;
        }

        #yesBtn:hover {
            box-shadow: 0 6px 20px rgba(255, 77, 109, 0.5);
        }

        .hidden {
            display: none;
        }

        #successMessage {
            color: #d63384;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="main-ui">
        <h1 id="questionText">Will you be my girlfriend? ❤️</h1>
        <div class="btn-container">
            <button id="yesBtn">YES!</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <div id="successMessage" class="hidden">
        <h1>Aww I love you too!!!!! >o< 🥰✨</h1>
        <p style="font-size: 5rem; margin: 0; filter: drop-shadow(0 0 10px rgba(255, 20, 147, 0.5));">💖😍🥲</p>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const questionText = document.getElementById('questionText');
        const mainUI = document.getElementById('main-ui');
        const successMessage = document.getElementById('successMessage');

        // --- YOUR REDIRECT LINK ---
        const redirectUrl = "https://chhaiya-web.vercel.app/";

        let yesScale = 1;
        let noClickCount = 0;

        const phrases = [
            "Are you sure? 🥺",
            "Think again!",
            "Pleeaaaase?",
            "Don't do this to me...",
            "I'll be very sad...",
            "Look how big the YES button is now!",
            "You're just playing now, right?",
            "Just click the pink one!"
        ];

        // 5. FUNCTION TO CREATE FLOATING HEARTS
        function createHearts() {
            const container = document.body;
            const heart = document.createElement('div');
            heart.classList.add('heart-float');
            heart.innerHTML = '❤️'; // Use heart symbol
            
            // Randomize position and size
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's'; // 2 to 5 seconds
            
            // Set random drift (CSS variable)
            const randomX = (Math.random() - 0.5) * 40 + 'vw';
            heart.style.setProperty('--floating-x', randomX);

            container.appendChild(heart);

            // Remove heart after it floats up
            setTimeout(() => {
                heart.remove();
            }, 5000); 
        }

        // Start floating hearts immediately and keep them going
        setInterval(createHearts, 300); // New heart every 300ms

        noBtn.addEventListener('click', () => {
            noClickCount++;
            
            // Check if this is the second click
            if (noClickCount >= 3) {
                window.location.href = redirectUrl;
                return; // Stop the rest of the code from running
            }

            // 1. Make the YES button grow (only happens on 1st click)
            yesScale += 1.5; 
            yesBtn.style.transform = `scale(${yesScale})`;

            // 2. Change the question text
            questionText.innerText = phrases[0];

            // 3. Move the NO button to a random spot
            // (The button only jumps to absolute position AFTER first click)
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 50);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 50);
            
            noBtn.style.position = 'absolute';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        });

        yesBtn.addEventListener('click', () => {
            mainUI.classList.add('hidden');
            successMessage.classList.remove('hidden');
        });
    </script>
</body>
</html>
