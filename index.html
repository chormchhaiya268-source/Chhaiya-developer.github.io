<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I have a private question...</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4e1 50%, #fff0f5 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        .heart-float {
            position: absolute;
            bottom: -50px;
            color: #ffb6c1;
            font-size: 1.5rem;
            animation: float-around 5s infinite ease-in;
            opacity: 0.8;
            pointer-events: none;
        }

        @keyframes float-around {
            0% { transform: translateY(0) scale(0.5) translateX(0); opacity: 0.8; }
            100% { transform: translateY(-120vh) scale(1.5) translateX(var(--floating-x)); opacity: 0; }
        }

        h1 {
            color: #d63384;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            padding: 0 20px;
            text-shadow: 0 2px 5px rgba(255, 182, 193, 0.5);
            z-index: 10;
        }

        .btn-container {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
            z-index: 1000;
            transform-origin: center bottom;
        }

        #noBtn {
            background-color: #adb5bd;
            color: white;
            position: relative;
        }

        .hidden { display: none; }

        #successMessage { color: #d63384; z-index: 10; }
    </style>
</head>
<body>

    <div id="main-ui">
        <h1 id="questionText">Som jui muy❤️</h1>
        <div class="btn-container">
            <button id="yesBtn">YES!</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <div id="successMessage" class="hidden">
        <h1>Awww i love you too!!!!! ❤️🥰✨</h1>
        <p style="font-size: 5rem; margin: 0; filter: drop-shadow(0 0 10px rgba(255, 20, 147, 0.5));">💖</p>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const questionText = document.getElementById('questionText');
        const mainUI = document.getElementById('main-ui');
        const successMessage = document.getElementById('successMessage');

        const redirectUrl = "https://chhaiya-web.vercel.app/";

        let yesScale = 1;
        let noClickCount = 0;

        // --- RANDOM "PLEASE" PHRASES ---
        const pleasePhrases = [
            "Please? 🥺",
            "Pretty please with a cherry on top?",
            "Think about the snacks I'll buy you!",
            "I promise to be the best! 🌹",
            "Don't be mean! Just say yes! ✨",
            "I'll give you all my attention! 💖",
            "You're breaking my heart... please?",
            "Come on, look how big the YES button is!",
            "I'll cook for you! (maybe) 🍕",
            "Just click the pink one, it looks better!"
        ];

        function createHearts() {
            const heart = document.createElement('div');
            heart.classList.add('heart-float');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            const randomX = (Math.random() - 0.5) * 40 + 'vw';
            heart.style.setProperty('--floating-x', randomX);
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000); 
        }
        setInterval(createHearts, 300);

        noBtn.addEventListener('click', () => {
            noClickCount++;
            
            if (noClickCount >= 3) {
                window.location.href = redirectUrl;
                return;
            }

            // 1. Make YES button grow
            yesScale += 1.8; 
            yesBtn.style.transform = `scale(${yesScale})`;

            // 2. CHANGE TO A RANDOM PHRASE
            const randomPhrase = pleasePhrases[Math.floor(Math.random() * pleasePhrases.length)];
            questionText.innerText = randomPhrase;

            // 3. Move NO button
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 50);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 50);
            noBtn.style.position = 'absolute';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        });

        yesBtn.addEventListener('click', () => {
            mainUI.classList.add('hidden');
            successMessage.classList.remove('hidden');
        });
    </script>
</body>
</html>
