<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I have a question...</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #fff5f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        h1 {
            color: #d63384;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            padding: 0 20px;
        }

        .btn-container {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease-in-out;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
            z-index: 999; /* Keeps Yes button on top */
        }

        #noBtn {
            background-color: #adb5bd;
            color: white;
            position: relative;
        }

        .hidden {
            display: none;
        }

        #successMessage {
            color: #d63384;
        }
    </style>
</head>
<body>

    <div id="main-ui">
        <h1 id="questionText">Will you be my girlfriend? ❤️</h1>
        <div class="btn-container">
            <button id="yesBtn">YES!</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <div id="successMessage" class="hidden">
        <h1>I knew you'd say yes! 🥰✨</h1>
        <p style="font-size: 4rem;">💖</p>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const questionText = document.getElementById('questionText');
        const mainUI = document.getElementById('main-ui');
        const successMessage = document.getElementById('successMessage');

        let yesScale = 1;
        let noClickCount = 0;

        const phrases = [
            "Are you sure?",
            "Think again! 🥺",
            "Pleeaaaase?",
            "Don't do this to me...",
            "I'll be very sad...",
            "Look how big the YES button is now!",
            "You're just playing now, right?",
            "Just click the pink one!"
        ];

        noBtn.addEventListener('click', () => {
            noClickCount++;
            
            // 1. Make the YES button grow
            yesScale += 0.4;
            yesBtn.style.transform = `scale(${yesScale})`;

            // 2. Change the question text
            const phraseIndex = Math.min(noClickCount - 1, phrases.length - 1);
            questionText.innerText = phrases[phraseIndex];

            // 3. Move the NO button to a random spot so it's hard to click
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 50);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 50);
            
            noBtn.style.position = 'absolute';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        });

        yesBtn.addEventListener('click', () => {
            mainUI.classList.add('hidden');
            successMessage.classList.remove('hidden');
            
            // Optional: Redirect to your portfolio after 3 seconds
            /*
            setTimeout(() => {
                window.location.href = "https://chormchhaiya268-source.github.io/Chhaiya-developer.github.io/";
            }, 3000);
            */
        });
    </script>
</body>
</html>
