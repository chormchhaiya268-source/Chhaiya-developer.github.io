<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Quick Question...</title>

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffeef8, #ffd6ec, #ffc1e3);
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        .heart {
            position: absolute;
            bottom: -50px;
            font-size: 2rem;
            animation: floatUp linear infinite;
            opacity: 0.8;
            user-select: none;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            100% {
                transform: translateY(-120vh) rotate(360deg);
                opacity: 0;
            }
        }

        h1 {
            color: #d81b60;
            font-size: 2.5rem;
            margin-bottom: 30px;
            z-index: 2;
        }

        .container {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            z-index: 2;
            position: relative;
            min-height: 200px;
            min-width: 300px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            font-weight: bold;
        }

        #yesBtn {
            background-color: #ff4081;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 64, 129, 0.4);
        }

        #yesBtn:hover {
            transform: scale(1.08);
        }

        #noBtn {
            background-color: #9e9e9e;
            color: white;
            position: relative;
        }

        .success-message {
            display: none;
            color: #d81b60;
            animation: heartBeat 1.5s infinite;
            z-index: 2;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        #quiz, #celebration {
            background: rgba(255,255,255,0.25);
            padding: 40px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(255, 64, 129, 0.25);
            z-index: 2;
            position: relative;
        }
        /* MOBILE RESPONSIVE */
@media (max-width: 600px) {

    h1 {
        font-size: 1.8rem;
        padding: 0 15px;
    }

    #quiz,
    #celebration {
        width: 85%;
        padding: 25px;
    }

    .container {
        flex-direction: column;
        gap: 15px;
        min-height: 250px;
    }

    button {
        width: 100%;
        max-width: 260px;
        font-size: 1rem;
        padding: 14px 20px;
    }

    .success-message p {
        font-size: 3rem !important;
    }

    .heart {
        font-size: 1.5rem;
    }
}
    </style>
</head>

<body>

    <!-- Romantic Song -->
    <!-- Put your mp3 file in same folder and rename it to perfect.mp3 -->
    <audio id="noSound">
        <source src="freesound_community-baby-cry-101477.mp3" type="audio/mp3">
    </audio>
    <audio id="bgMusic" loop>
        <source src="Until I Found You_spotdown.org.mp3" type="audio/mp3">
    </audio>

    <script>
        const emojis = ["❤️", "😍", "😘", "💖", "💕", "🥰"];

        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (Math.random() * 4 + 4) + "s";
            heart.style.fontSize = (Math.random() * 25 + 20) + "px";
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 8000);
        }

        setInterval(createHeart, 250);
    </script>

    <div id="quiz">
        <h1 id="question">Will you be my girlfriend? ❤️</h1>

        <div class="container" id="buttonArea">
            <button id="yesBtn">Of course, YES!</button>
            <button id="noBtn">No way</button>
        </div>
    </div>

    <div id="celebration" class="success-message">
        <h1>Awww I love you too!!!! 🥰✨</h1>
        <p style="font-size: 5rem;">❤️Listen to this song!💖😘</p>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const buttonArea = document.getElementById('buttonArea');
        const quiz = document.getElementById('quiz');
        const celebration = document.getElementById('celebration');
        const music = document.getElementById('bgMusic');
        const noSound = document.getElementById('noSound');
        
        let yesSize = 1.2;
        let textIndex = 0;

        const rejectionTexts = [
            "Are you sure?",
            "Think again!",
            "Really?",
            "Last chance...",
            "You're breaking my heart!",
            "I'll buy you snacks!",
            "Pretty please?",
            "Please baby!!!!!"
        ];

        noBtn.addEventListener('click', () => {
            noSound.play();
            yesSize += 0.5;
            yesBtn.style.fontSize = yesSize + 'rem';
            yesBtn.style.padding = (yesSize * 10) + 'px ' + (yesSize * 20) + 'px';

            noBtn.innerText = rejectionTexts[textIndex];
            textIndex = (textIndex + 1) % rejectionTexts.length;

            const areaRect = buttonArea.getBoundingClientRect();
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;
            const padding = 10;

            const maxX = Math.max(padding, areaRect.width - btnWidth - padding);
            const maxY = Math.max(padding, areaRect.height - btnHeight - padding);

            noBtn.style.position = 'absolute';
            noBtn.style.left = Math.random() * maxX + 'px';
            noBtn.style.top = Math.random() * maxY + 'px';
        });

        yesBtn.addEventListener('click', () => {

            // PLAY MUSIC
            music.play();

            // SHOW LOVE MESSAGE
            quiz.style.display = 'none';
            celebration.style.display = 'block';

        });
    </script>

</body>
</html>
